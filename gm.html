<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cutscene Manager</title>
<style>
  :root {
    --bg:         #0d0d1a;
    --surface:    #16162a;
    --surface2:   #222240;
    --surface3:   #2d2d50;
    --accent:     #8b5cf6;
    --accent-dim: #6d28d9;
    --text:       #e2e8f0;
    --muted:      #94a3b8;
    --border:     #2d2d4e;
    --danger:     #ef4444;
    --success:    #22c55e;
    --warn:       #f59e0b;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:13px; overflow:hidden; user-select:none;
  }

  #app { display:flex; flex-direction:column; height:100vh; }
  .header {
    display:flex; align-items:center; gap:8px;
    padding:10px 14px;
    background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .header h1 { font-size:14px; font-weight:700; flex:1; }
  .live-badge {
    background:var(--success); color:white;
    font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px;
    text-transform:uppercase; letter-spacing:.1em;
    display:none; animation:pulse-badge 2s infinite;
  }
  .live-badge.visible { display:block; }
  @keyframes pulse-badge { 0%,100%{opacity:1} 50%{opacity:.6} }

  .main { display:flex; flex:1; overflow:hidden; }

  .sidebar {
    width:120px; flex-shrink:0;
    background:var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column;
  }
  .sidebar-top {
    padding:8px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .sidebar-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); }
  .icon-btn {
    width:22px; height:22px; background:var(--accent); border:none; border-radius:5px;
    cursor:pointer; color:white; font-size:16px;
    display:flex; align-items:center; justify-content:center; transition:background .15s;
  }
  .icon-btn:hover { background:var(--accent-dim); }
  .scene-list { flex:1; overflow-y:auto; padding:4px; }
  .scene-item {
    padding:7px 8px; border-radius:6px; cursor:pointer;
    display:flex; align-items:center; gap:6px;
    margin-bottom:2px; border:1px solid transparent; transition:all .15s;
  }
  .scene-item:hover { background:var(--surface2); }
  .scene-item.active { background:var(--surface2); border-color:var(--accent); }
  .dot { width:5px; height:5px; border-radius:50%; background:var(--muted); flex-shrink:0; }
  .scene-item.active .dot { background:var(--accent); }
  .scene-label { font-size:11px; line-height:1.3; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .no-scenes { padding:14px 8px; text-align:center; color:var(--muted); font-size:11px; line-height:1.6; }

  .editor { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:9px; }
  .editor-empty { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--muted); text-align:center; gap:10px; }
  .editor-empty .big { font-size:34px; opacity:.3; }

  .field { display:flex; flex-direction:column; gap:3px; }
  .field label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
  .field input, .field textarea, .field select {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:6px; padding:6px 9px; color:var(--text);
    font-size:12px; font-family:inherit; outline:none; transition:border-color .15s; width:100%;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color:var(--accent); }
  .field textarea { resize:vertical; min-height:48px; }
  .field select { cursor:pointer; }
  .field select option { background:var(--surface2); }
  .row { display:flex; gap:8px; }
  .row .field { flex:1; }

  /* Gallery */
  .gallery-section { display:flex; flex-direction:column; gap:6px; }
  .gallery-header { display:flex; align-items:center; justify-content:space-between; }
  .gallery-header label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
  .gallery-count { font-size:10px; color:var(--muted); background:var(--surface3); padding:2px 7px; border-radius:10px; }

  /* Upload tabs */
  .upload-tabs { display:flex; gap:2px; background:var(--surface3); border-radius:8px; padding:3px; }
  .upload-tab {
    flex:1; padding:5px 4px; border:none; border-radius:6px; cursor:pointer;
    font-size:11px; font-weight:600; font-family:inherit;
    background:transparent; color:var(--muted); transition:all .15s; text-align:center;
  }
  .upload-tab.active { background:var(--surface2); color:var(--text); }

  .tab-panel { display:none; flex-direction:column; gap:6px; }
  .tab-panel.active { display:flex; }

  .add-image-row { display:flex; gap:6px; }
  .add-image-row input {
    flex:1; background:var(--surface2); border:1px solid var(--border);
    border-radius:6px; padding:6px 9px; color:var(--text);
    font-size:12px; font-family:inherit; outline:none; transition:border-color .15s;
  }
  .add-image-row input:focus { border-color:var(--accent); }
  .add-image-row input::placeholder { color:var(--muted); }
  .btn-add-img {
    background:var(--accent); border:none; border-radius:6px;
    padding:6px 10px; color:white; cursor:pointer;
    font-size:12px; font-weight:600; font-family:inherit;
    white-space:nowrap; transition:background .15s; flex-shrink:0;
  }
  .btn-add-img:hover { background:var(--accent-dim); }

  /* File drop zone */
  .file-drop-zone {
    border:2px dashed var(--border); border-radius:8px;
    padding:16px 12px; text-align:center; cursor:pointer;
    transition:all .2s; position:relative;
  }
  .file-drop-zone:hover, .file-drop-zone.drag-over { border-color:var(--accent); background:rgba(139,92,246,.06); }
  .file-drop-zone input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .drop-icon { font-size:22px; margin-bottom:5px; }
  .drop-label { font-size:11px; color:var(--muted); line-height:1.5; }
  .drop-label strong { color:var(--text); }

  /* Progress */
  .upload-progress { background:var(--surface2); border-radius:6px; padding:8px 10px; display:none; align-items:center; gap:8px; }
  .upload-progress.visible { display:flex; }
  .progress-bar-track { flex:1; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
  .progress-bar-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .3s; width:0%; }
  .progress-label { font-size:11px; color:var(--muted); white-space:nowrap; }

  .size-hint { font-size:10px; color:var(--muted); line-height:1.5; }
  .size-hint.warn { color:var(--warn); }

  /* Image list */
  .image-list { display:flex; flex-direction:column; gap:4px; }
  .image-list-empty { padding:14px; text-align:center; color:var(--muted); font-size:11px; line-height:1.6; border:1px dashed var(--border); border-radius:8px; }
  .image-item {
    display:flex; align-items:center; gap:8px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:6px 8px; transition:all .15s;
  }
  .image-item.current-slide { border-color:var(--accent); background:rgba(139,92,246,.08); }
  .image-thumb { width:38px; height:28px; border-radius:4px; object-fit:cover; flex-shrink:0; background:var(--surface3); border:1px solid var(--border); }
  .image-thumb-placeholder { width:38px; height:28px; border-radius:4px; flex-shrink:0; background:var(--surface3); border:1px dashed var(--border); display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--muted); }
  .image-info { flex:1; overflow:hidden; }
  .image-num { font-size:10px; font-weight:700; color:var(--accent); margin-bottom:1px; }
  .image-url-preview { font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .slide-badge { font-size:9px; font-weight:700; text-transform:uppercase; background:var(--accent); color:white; padding:2px 5px; border-radius:4px; letter-spacing:.05em; flex-shrink:0; }
  .image-actions { display:flex; gap:3px; flex-shrink:0; }
  .img-action-btn { width:22px; height:22px; border:1px solid var(--border); border-radius:5px; cursor:pointer; background:var(--surface3); color:var(--muted); font-size:12px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
  .img-action-btn:hover { background:var(--surface2); color:var(--text); }
  .img-action-btn.del:hover { color:var(--danger); border-color:var(--danger); }

  /* Live controls */
  .gallery-controls { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; flex-direction:column; gap:8px; display:none; }
  .gallery-controls.visible { display:flex; }
  .gallery-controls-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--accent); }
  .gallery-nav { display:flex; align-items:center; gap:8px; }
  .nav-btn { background:var(--surface3); border:1px solid var(--border); border-radius:7px; padding:7px 12px; cursor:pointer; color:var(--text); font-size:14px; transition:all .15s; flex-shrink:0; }
  .nav-btn:hover:not(:disabled) { background:var(--accent); border-color:var(--accent); }
  .nav-btn:disabled { opacity:.3; cursor:not-allowed; }
  .slide-indicator { flex:1; text-align:center; font-size:12px; font-weight:600; }
  .slide-dots { display:flex; gap:5px; justify-content:center; flex-wrap:wrap; }
  .slide-dot { width:7px; height:7px; border-radius:50%; background:var(--border); cursor:pointer; transition:all .2s; border:none; padding:0; }
  .slide-dot.active { background:var(--accent); transform:scale(1.3); }

  .danger-zone { display:flex; justify-content:flex-end; margin-top:2px; }
  .btn-delete { background:none; border:1px solid var(--border); border-radius:6px; padding:5px 10px; cursor:pointer; color:var(--danger); font-size:11px; font-family:inherit; transition:all .15s; }
  .btn-delete:hover { background:rgba(239,68,68,.12); border-color:var(--danger); }

  .bottom { padding:9px 12px; background:var(--surface); border-top:1px solid var(--border); display:flex; gap:6px; flex-shrink:0; }
  .btn { padding:8px; border:none; border-radius:7px; cursor:pointer; font-size:12px; font-weight:600; font-family:inherit; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:4px; }
  .btn:disabled { opacity:.35; cursor:not-allowed; }
  .btn-preview { background:var(--surface2); color:var(--text); border:1px solid var(--border); flex:1; }
  .btn-preview:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
  .btn-trigger { background:var(--accent); color:white; flex:2; }
  .btn-trigger:hover:not(:disabled) { background:var(--accent-dim); }
  .btn-trigger.live { background:var(--success); animation:pulse-btn 2s infinite; }
  .btn-stop { background:var(--surface2); border:1px solid var(--border); color:var(--danger); flex:0 0 38px; padding:8px 0; }
  .btn-stop:hover { background:rgba(239,68,68,.1); border-color:var(--danger); }
  @keyframes pulse-btn { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5)} 50%{box-shadow:0 0 0 5px rgba(34,197,94,0)} }

  #toast { position:fixed; bottom:64px; left:50%; transform:translateX(-50%) translateY(6px); background:var(--surface3); color:var(--text); padding:5px 14px; border-radius:20px; font-size:12px; border:1px solid var(--border); opacity:0; pointer-events:none; transition:all .25s; white-space:nowrap; z-index:200; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <span>🎬</span>
    <h1>Cutscene Manager</h1>
    <span class="live-badge" id="live-badge">● Live</span>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-top">
        <span class="sidebar-label">Scenes</span>
        <button class="icon-btn" id="add-btn">+</button>
      </div>
      <div class="scene-list" id="scene-list">
        <div class="no-scenes">No scenes yet.<br>Click + to add.</div>
      </div>
    </div>
    <div class="editor" id="editor">
      <div class="editor-empty">
        <div class="big">🎭</div>
        <div>Select or create a scene<br>to start editing</div>
      </div>
    </div>
  </div>
  <div class="bottom">
    <button class="btn btn-preview" id="preview-btn" disabled>👁 Preview</button>
    <button class="btn btn-trigger" id="trigger-btn" disabled>▶ Trigger</button>
    <button class="btn btn-stop"    id="stop-btn">⏹</button>
  </div>
</div>
<div id="toast"></div>

<script type="module">
import OBR from "https://esm.sh/@owlbear-rodeo/sdk";

const META_SCENES = "cutscene-manager/scenes";
const META_ACTIVE = "cutscene-manager/active";
const CH_TRIGGER  = "cutscene-manager/trigger";
const CH_STOP     = "cutscene-manager/stop";
const CH_SLIDE    = "cutscene-manager/slide";
const MODAL_ID    = "cutscene-overlay";
// OBR metadata has a strict size limit (~100KB per key in practice).
// 480×340 @ 0.55 quality ≈ 25–50KB per image — reliably fits.
const MAX_W = 480, MAX_H = 340, QUALITY = 0.55;

let scenes = [], selectedId = null, saveTimer = null;
let isLive = false, currentSlide = 0, activeTab = "url";

// ── Utils ──────────────────────────────────────────────────
function uid() { return crypto?.randomUUID?.() ?? Math.random().toString(36).slice(2)+Date.now().toString(36); }
function esc(s) { return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(el._t); el._t = setTimeout(()=>el.classList.remove("show"), 2400);
}
function setLive(live) {
  isLive = live;
  document.getElementById("live-badge").classList.toggle("visible", live);
  const t = document.getElementById("trigger-btn");
  t.classList.toggle("live", live); t.textContent = live ? "● LIVE" : "▶ Trigger";
  document.getElementById("gallery-controls")?.classList.toggle("visible", live);
}
async function persistScenes() { await OBR.room.setMetadata({ [META_SCENES]: scenes }); }

// ── Image compression ──────────────────────────────────────
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let { width: w, height: h } = img;
        const ratio = Math.min(MAX_W/w, MAX_H/h, 1);
        w = Math.round(w*ratio); h = Math.round(h*ratio);
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", QUALITY);
        const kb = Math.round(dataUrl.length*3/4/1024);
        resolve({ dataUrl, kb, w, h });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── Google Drive converter ─────────────────────────────────
// Uses /thumbnail endpoint — unlike uc?export=view, this works inside iframes
// and bypasses Google's "too large to scan" warning page.
function convertGDriveUrl(input) {
  const m1 = input.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  const m2 = input.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  const id  = m1?.[1] || m2?.[1];
  return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w1280` : null;
}

// ── Sidebar ────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById("scene-list");
  if (!scenes.length) { list.innerHTML='<div class="no-scenes">No scenes yet.<br>Click + to add.</div>'; return; }
  list.innerHTML = scenes.map(s=>`
    <div class="scene-item ${s.id===selectedId?"active":""}" data-id="${s.id}">
      <div class="dot"></div><span class="scene-label">${esc(s.name)}</span>
    </div>`).join("");
  list.querySelectorAll(".scene-item").forEach(el=>el.addEventListener("click",()=>selectScene(el.dataset.id)));
}

// ── Image item ─────────────────────────────────────────────
function renderImageItem(url, i, total, isCurrent) {
  const isB64 = url.startsWith("data:");
  const label = isB64 ? "📁 Local image" : (url.length>36 ? url.slice(0,33)+"…" : url);
  return `
    <div class="image-item ${isCurrent?"current-slide":""}" data-index="${i}">
      <img class="image-thumb" src="${esc(url)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="image-thumb-placeholder" style="display:none">🖼️</div>
      <div class="image-info">
        <div class="image-num">Image ${i+1}</div>
        <div class="image-url-preview">${esc(label)}</div>
      </div>
      ${isCurrent?'<span class="slide-badge">Shown</span>':""}
      <div class="image-actions">
        ${i>0?`<button class="img-action-btn move-up-btn" data-index="${i}">↑</button>`:'<button class="img-action-btn" disabled style="opacity:.2">↑</button>'}
        ${i<total-1?`<button class="img-action-btn move-dn-btn" data-index="${i}">↓</button>`:'<button class="img-action-btn" disabled style="opacity:.2">↓</button>'}
        <button class="img-action-btn del remove-img-btn" data-index="${i}">✕</button>
      </div>
    </div>`;
}

// ── Editor ─────────────────────────────────────────────────
function renderEditor() {
  const editor = document.getElementById("editor");
  const previewBtn = document.getElementById("preview-btn");
  const triggerBtn = document.getElementById("trigger-btn");
  const scene = scenes.find(s=>s.id===selectedId);
  if (!scene) {
    previewBtn.disabled = triggerBtn.disabled = true;
    editor.innerHTML=`<div class="editor-empty"><div class="big">🎭</div><div>Select or create a scene<br>to start editing</div></div>`;
    return;
  }
  previewBtn.disabled = triggerBtn.disabled = false;
  const images = scene.images ?? [];

  editor.innerHTML = `
    <div class="field">
      <label>Scene Name</label>
      <input id="f-name" value="${esc(scene.name)}" placeholder="The Dark Forest">
    </div>

    <div class="gallery-section">
      <div class="gallery-header">
        <label>Images</label>
        <span class="gallery-count">${images.length} image${images.length!==1?"s":""}</span>
      </div>

      <div class="upload-tabs">
        <button class="upload-tab ${activeTab==="url"?"active":""}"    data-tab="url">🔗 URL</button>
        <button class="upload-tab ${activeTab==="gdrive"?"active":""}" data-tab="gdrive">☁️ Drive</button>
      </div>

      <!-- URL tab -->
      <div class="tab-panel ${activeTab==="url"?"active":""}" id="tab-url">
        <div class="add-image-row">
          <input id="new-img-url" placeholder="https://example.com/image.jpg">
          <button class="btn-add-img" id="add-url-btn">+ Add</button>
        </div>
      </div>

      <!-- Google Drive tab -->
      <div class="tab-panel ${activeTab==="gdrive"?"active":""}" id="tab-gdrive">
        <div class="size-hint">
          In Google Drive: right-click image → <strong>Share</strong> → set to <em>Anyone with the link</em> → copy link.
        </div>
        <div class="add-image-row">
          <input id="gdrive-url" placeholder="https://drive.google.com/file/d/…/view">
          <button class="btn-add-img" id="gdrive-add-btn">→ Add</button>
        </div>
        <div class="size-hint" id="gdrive-hint" style="display:none"></div>
      </div>

      <!-- Image list -->
      <div class="image-list" id="image-list">
        ${images.length===0
          ? '<div class="image-list-empty">🖼️ No images yet.<br>Use a tab above to add your first image.</div>'
          : images.map((url,i)=>renderImageItem(url,i,images.length,i===currentSlide&&isLive)).join("")}
      </div>
    </div>

    <!-- Live nav -->
    <div class="gallery-controls ${isLive?"visible":""}" id="gallery-controls">
      <div class="gallery-controls-label">🎬 Live Controls</div>
      <div class="gallery-nav">
        <button class="nav-btn" id="prev-btn" ${currentSlide===0?"disabled":""}>◀</button>
        <div class="slide-indicator">${currentSlide+1} / ${images.length||1}</div>
        <button class="nav-btn" id="next-btn" ${currentSlide>=images.length-1?"disabled":""}>▶</button>
      </div>
      <div class="slide-dots">
        ${images.map((_,i)=>`<button class="slide-dot ${i===currentSlide?"active":""}" data-index="${i}"></button>`).join("")}
      </div>
    </div>

    <div class="field">
      <label>Caption Text</label>
      <textarea id="f-caption" placeholder="The trees close in around you…">${esc(scene.caption)}</textarea>
    </div>
    <div class="field">
      <label>Music / Audio</label>
      <input id="f-audio" value="${esc(scene.audioUrl)}" placeholder="YouTube URL or direct .mp3/.ogg link">
      <div style="font-size:10px;color:var(--muted);margin-top:3px;line-height:1.5">
        Paste a YouTube link (e.g. <em>youtu.be/…</em>) or a direct audio file URL.
        YouTube plays audio only — video is hidden from players.
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Entrance Effect</label>
        <select id="f-effect">
          <option value="fade"   ${scene.effect==="fade"  ?"selected":""}>✨ Fade In</option>
          <option value="flash"  ${scene.effect==="flash" ?"selected":""}>⚡ Flash</option>
          <option value="slide"  ${scene.effect==="slide" ?"selected":""}>⬆ Slide Up</option>
          <option value="zoom"   ${scene.effect==="zoom"  ?"selected":""}>🔭 Zoom In</option>
          <option value="reveal" ${scene.effect==="reveal"?"selected":""}>🌅 Reveal</option>
        </select>
      </div>
      <div class="field">
        <label>Auto-close (s)</label>
        <input id="f-duration" type="number" min="0" value="${scene.duration??0}">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Mood Background</label>
        <select id="f-overlay">
          <option value="black"    ${scene.overlay==="black"   ?"selected":""}>⬛ Black</option>
          <option value="darkblue" ${scene.overlay==="darkblue"?"selected":""}>🌊 Dark Blue</option>
          <option value="sepia"    ${scene.overlay==="sepia"   ?"selected":""}>📜 Sepia</option>
          <option value="blood"    ${scene.overlay==="blood"   ?"selected":""}>🩸 Blood Red</option>
          <option value="forest"   ${scene.overlay==="forest"  ?"selected":""}>🌲 Dark Green</option>
        </select>
      </div>
      <div class="field">
        <label>Letterbox</label>
        <select id="f-letterbox">
          <option value="yes" ${scene.letterbox!==false?"selected":""}>✅ Yes</option>
          <option value="no"  ${scene.letterbox===false?"selected":""}>❌ No</option>
        </select>
      </div>
    </div>
    <div class="danger-zone">
      <button class="btn-delete" id="delete-btn">🗑 Delete Scene</button>
    </div>
  `;
  wireEditor();
}

function wireEditor() {
  const scene = scenes.find(s=>s.id===selectedId);
  if (!scene) return;

  ["f-name","f-caption","f-audio","f-effect","f-duration","f-overlay","f-letterbox"].forEach(id=>{
    const el = document.getElementById(id);
    if (el) { el.addEventListener("input",scheduleAutoSave); el.addEventListener("change",scheduleAutoSave); }
  });

  // Tabs
  document.querySelectorAll(".upload-tab").forEach(btn=>
    btn.addEventListener("click",()=>{ activeTab=btn.dataset.tab; renderEditor(); })
  );

  // URL tab
  const addUrlBtn = document.getElementById("add-url-btn");
  const urlInput  = document.getElementById("new-img-url");
  const doAddUrl = () => {
    const url = urlInput?.value.trim(); if (!url) return;
    if (!scene.images) scene.images=[];
    scene.images.push(url); urlInput.value="";
    persistScenes(); renderEditor(); showToast("🖼️ Image added");
  };
  addUrlBtn?.addEventListener("click", doAddUrl);
  urlInput?.addEventListener("keydown", e=>{ if(e.key==="Enter") doAddUrl(); });

  // Local file tab — removed
  // (local upload removed due to OBR metadata size limits)

  // Google Drive tab
  const gdriveInput = document.getElementById("gdrive-url");
  const gdriveBtn   = document.getElementById("gdrive-add-btn");
  const gdriveHint  = document.getElementById("gdrive-hint");
  const doAddDrive = () => {
    const raw = gdriveInput?.value.trim(); if (!raw) return;
    const converted = convertGDriveUrl(raw);
    if (!converted) {
      if (gdriveHint) { gdriveHint.style.display="block"; gdriveHint.className="size-hint warn"; gdriveHint.textContent="⚠️ Could not parse this Drive link. Make sure you copy the full sharing URL."; }
      return;
    }
    if (!scene.images) scene.images=[];
    scene.images.push(converted); gdriveInput.value="";
    if (gdriveHint) gdriveHint.style.display="none";
    persistScenes(); renderEditor(); showToast("☁️ Drive image added");
  };
  gdriveBtn?.addEventListener("click", doAddDrive);
  gdriveInput?.addEventListener("keydown", e=>{ if(e.key==="Enter") doAddDrive(); });

  // Image list
  document.querySelectorAll(".remove-img-btn").forEach(btn=>btn.addEventListener("click",()=>{
    const i=parseInt(btn.dataset.index); scene.images.splice(i,1);
    if (currentSlide>=scene.images.length) currentSlide=Math.max(0,scene.images.length-1);
    persistScenes(); renderEditor(); showToast("🗑 Image removed");
  }));
  document.querySelectorAll(".move-up-btn").forEach(btn=>btn.addEventListener("click",()=>{
    const i=parseInt(btn.dataset.index);
    [scene.images[i-1],scene.images[i]]=[scene.images[i],scene.images[i-1]];
    persistScenes(); renderEditor();
  }));
  document.querySelectorAll(".move-dn-btn").forEach(btn=>btn.addEventListener("click",()=>{
    const i=parseInt(btn.dataset.index);
    [scene.images[i+1],scene.images[i]]=[scene.images[i],scene.images[i+1]];
    persistScenes(); renderEditor();
  }));

  // Live nav
  document.querySelectorAll(".slide-dot").forEach(dot=>dot.addEventListener("click",()=>goToSlide(parseInt(dot.dataset.index))));
  document.getElementById("prev-btn")?.addEventListener("click",()=>goToSlide(currentSlide-1));
  document.getElementById("next-btn")?.addEventListener("click",()=>goToSlide(currentSlide+1));
  document.getElementById("delete-btn")?.addEventListener("click", deleteScene);
}

async function goToSlide(index) {
  const scene = scenes.find(s=>s.id===selectedId);
  if (!scene) return;
  const images = scene.images??[];
  if (index<0||index>=images.length) return;
  currentSlide = index;
  OBR.broadcast.sendMessage(CH_SLIDE, { sceneId:selectedId, slideIndex:index }, { destination:"ALL" });
  await OBR.room.setMetadata({ [META_ACTIVE]:selectedId, "cutscene-manager/slide":index });
  renderEditor();
}

function scheduleAutoSave() { clearTimeout(saveTimer); saveTimer=setTimeout(flushEdits,600); }
function flushEdits() {
  const scene = scenes.find(s=>s.id===selectedId); if (!scene) return;
  const read = id=>document.getElementById(id)?.value??"";
  scene.name=read("f-name")||scene.name; scene.caption=read("f-caption");
  scene.audioUrl=read("f-audio"); scene.effect=read("f-effect")||"fade";
  scene.duration=parseInt(read("f-duration"))||0; scene.overlay=read("f-overlay")||"black";
  scene.letterbox=read("f-letterbox")!=="no";
  persistScenes(); renderList();
}

function selectScene(id) { flushEdits(); selectedId=id; currentSlide=0; renderList(); renderEditor(); }
function addScene() {
  flushEdits();
  const scene={id:uid(),name:`Scene ${scenes.length+1}`,images:[],audioUrl:"",caption:"",effect:"fade",duration:0,overlay:"black",letterbox:true};
  scenes.push(scene); persistScenes(); currentSlide=0; selectScene(scene.id);
  showToast("✨ New scene created");
}
function deleteScene() {
  if (!selectedId) return;
  scenes=scenes.filter(s=>s.id!==selectedId); selectedId=null;
  persistScenes(); renderList(); renderEditor(); showToast("🗑 Scene deleted");
}

async function triggerScene() {
  flushEdits();
  const scene=scenes.find(s=>s.id===selectedId); if (!scene) return;
  currentSlide=0;
  await OBR.room.setMetadata({ [META_ACTIVE]:selectedId, "cutscene-manager/slide":0 });
  OBR.broadcast.sendMessage(CH_TRIGGER,{sceneId:selectedId,slideIndex:0},{destination:"REMOTE"});
  setLive(true); renderEditor(); showToast("🎬 Scene triggered for players!");
}
async function previewScene() {
  flushEdits(); if (!selectedId) return; currentSlide=0;
  await OBR.room.setMetadata({[META_ACTIVE]:selectedId,"cutscene-manager/slide":0});
  const playerUrl=new URL("player.html",window.location.href).href;
  await OBR.modal.open({id:MODAL_ID,url:playerUrl,fullScreen:true});
  showToast("👁 Previewing locally");
}
async function stopScene() {
  OBR.broadcast.sendMessage(CH_STOP,{},{destination:"REMOTE"});
  await OBR.modal.close(MODAL_ID);
  setLive(false); renderEditor(); showToast("⏹ Scene stopped");
}

OBR.onReady(async()=>{
  const role=await OBR.player.getRole();
  if (role!=="GM") {
    document.getElementById("app").innerHTML=`<div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;text-align:center;gap:12px;padding:20px;"><div style="font-size:36px">🔒</div><div>This panel is for the GM only.</div></div>`;
    return;
  }
  const metadata=await OBR.room.getMetadata();
  scenes=(metadata[META_SCENES]??[]).map(s=>({...s,images:s.images??(s.imageUrl?[s.imageUrl]:[])}));
  renderList(); renderEditor();
  document.getElementById("add-btn").addEventListener("click",addScene);
  document.getElementById("trigger-btn").addEventListener("click",triggerScene);
  document.getElementById("preview-btn").addEventListener("click",previewScene);
  document.getElementById("stop-btn").addEventListener("click",stopScene);
});
</script>
</body>
</html>
