<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cutscene</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif; }

  /* Mood backgrounds */
  .mood-black    { background:#000000; }
  .mood-darkblue { background:#020b18; }
  .mood-sepia    { background:#1a1208; }
  .mood-blood    { background:#1a0305; }
  .mood-forest   { background:#030d06; }

  /* Letterbox bars */
  .bar { position:fixed; left:0; right:0; z-index:20; background:#000; transform:scaleY(0); transition:transform .6s cubic-bezier(.4,0,.2,1); }
  .bar-top    { top:0;    height:10vh; transform-origin:top; }
  .bar-bottom { bottom:0; height:10vh; transform-origin:bottom; }
  body.letterbox .bar { transform:scaleY(1); }

  /* Stage */
  #stage {
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:12vh 6vw; z-index:10; opacity:0;
  }
  #stage.ready { opacity:1; }

  /* Image */
  #scene-img {
    max-width:100%; max-height:65vh; object-fit:contain;
    border-radius:3px; display:block;
    box-shadow:0 20px 80px rgba(0,0,0,.9);
    transition:opacity .45s ease, transform .45s ease;
  }
  #scene-img.hidden { opacity:0; transform:scale(.97); pointer-events:none; }

  /* Caption */
  #caption {
    margin-top:28px; max-width:700px; text-align:center;
    font-size:clamp(14px,2.2vw,22px); font-style:italic;
    color:#d4b896; letter-spacing:.04em; line-height:1.7;
    text-shadow:0 0 30px rgba(0,0,0,1), 0 2px 4px rgba(0,0,0,.8);
    opacity:0; transform:translateY(12px);
    transition:opacity .8s ease .4s, transform .8s ease .4s;
  }
  #caption.show { opacity:1; transform:translateY(0); }
  #caption:empty { display:none; }

  /* Gallery slide counter */
  #slide-counter {
    position:fixed; bottom:14vh; right:24px;
    z-index:30;
    background:rgba(0,0,0,.55);
    border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(8px);
    color:rgba(255,255,255,.7);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-size:12px; font-weight:600;
    padding:5px 12px; border-radius:20px;
    letter-spacing:.05em;
    opacity:0; transition:opacity .3s;
    display:none;
  }
  #slide-counter.visible { opacity:1; display:block; }

  /* Slide dots */
  #slide-dots {
    position:fixed; bottom:14vh; left:50%; transform:translateX(-50%);
    z-index:30; display:flex; gap:8px;
    opacity:0; transition:opacity .3s;
  }
  #slide-dots.visible { opacity:1; }
  .player-dot {
    width:8px; height:8px; border-radius:50%;
    background:rgba(255,255,255,.25);
    border:1px solid rgba(255,255,255,.3);
    transition:all .3s;
  }
  .player-dot.active {
    background:rgba(255,255,255,.85);
    transform:scale(1.25);
  }

  /* Entrance animations */
  @keyframes kFade   { from{opacity:0}         to{opacity:1} }
  @keyframes kFlash  { 0%{opacity:0;filter:brightness(8)} 25%{filter:brightness(1);opacity:1} 100%{opacity:1} }
  @keyframes kSlide  { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
  @keyframes kZoom   { from{opacity:0;transform:scale(.82)} to{opacity:1;transform:scale(1)} }
  @keyframes kReveal { 0%{opacity:0;clip-path:inset(50% 50% 50% 50%)} 100%{opacity:1;clip-path:inset(0 0 0 0)} }
  #stage.fx-fade   { animation:kFade   1.2s ease forwards; }
  #stage.fx-flash  { animation:kFlash  1.0s ease forwards; }
  #stage.fx-slide  { animation:kSlide  1.0s cubic-bezier(.16,1,.3,1) forwards; }
  #stage.fx-zoom   { animation:kZoom   1.0s cubic-bezier(.16,1,.3,1) forwards; }
  #stage.fx-reveal { animation:kReveal 1.4s cubic-bezier(.4,0,.2,1) forwards; }
  #stage.exit      { animation:kFade .7s ease reverse forwards !important; }

  /* Vignette */
  .vignette { position:fixed; inset:0; z-index:5; pointer-events:none; background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.7) 100%); }

  /* Loader */
  #loader { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:50; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .spinner { width:32px; height:32px; border:3px solid #222; border-top-color:#8b5cf6; border-radius:50%; animation:spin .8s linear infinite; }

  /* Particles */
  #particles { position:fixed; inset:0; pointer-events:none; z-index:15; opacity:0; transition:opacity .5s; }
  #particles.active { opacity:1; }
</style>
</head>
<body>
<div class="bar bar-top"></div>
<div class="bar bar-bottom"></div>
<div class="vignette"></div>
<canvas id="particles"></canvas>
<div id="loader"><div class="spinner"></div></div>

<div id="stage">
  <img id="scene-img" alt="Scene" src="">
  <p  id="caption"></p>
</div>

<div id="slide-counter"></div>
<div id="slide-dots"></div>

<!-- GM-only close button — hidden until role is confirmed -->
<button id="gm-close-btn" onclick="" style="
  display:none;
  position:fixed; top:16px; right:16px; z-index:100;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.25);
  backdrop-filter:blur(8px);
  color:rgba(255,255,255,0.85);
  font-size:13px; font-weight:600;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  padding:7px 14px; border-radius:20px;
  cursor:pointer; letter-spacing:0.04em;
  transition:all 0.2s;
" onmouseover="this.style.background='rgba(0,0,0,0.85)';this.style.borderColor='rgba(255,255,255,0.5)'"
   onmouseout="this.style.background='rgba(0,0,0,0.6)';this.style.borderColor='rgba(255,255,255,0.25)'">
  ✕ Close Preview
</button>

<!-- Hidden YouTube iframe for music (1x1, no controls) -->
<iframe id="yt-player" style="position:fixed;width:1px;height:1px;top:-9999px;left:-9999px;pointer-events:none;border:none" allow="autoplay" allowfullscreen></iframe>

<audio id="audio" loop></audio>

<script type="module">
import OBR from "https://esm.sh/@owlbear-rodeo/sdk";

const META_SCENES  = "cutscene-manager/scenes";
const META_ACTIVE  = "cutscene-manager/active";
const CH_STOP      = "cutscene-manager/stop";
const CH_SLIDE     = "cutscene-manager/slide";
const MODAL_ID     = "cutscene-overlay";

const MOODS = { black:"#000000", darkblue:"#020b18", sepia:"#1a1208", blood:"#1a0305", forest:"#030d06" };

let scene  = null;
let images = [];

// ── YouTube URL extractor ─────────────────────────────────
// Returns embed URL if input is a YouTube link, otherwise null
function getYouTubeEmbedUrl(input) {
  if (!input) return null;
  // Handles: youtu.be/ID, youtube.com/watch?v=ID, youtube.com/embed/ID
  const m = input.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  if (!m) return null;
  // autoplay=1, loop=1, playlist=ID (required for loop), no controls, no UI
  return `https://www.youtube.com/embed/${m[1]}?autoplay=1&loop=1&playlist=${m[1]}&controls=0&disablekb=1&modestbranding=1&rel=0&iv_load_policy=3&mute=0`;
}

// ── Helpers ──────────────────────────────────────────────
function setBackground(mood) { document.body.style.background = MOODS[mood] ?? MOODS.black; }
function applyLetterbox(on)  { document.body.classList.toggle("letterbox", on !== false); }

function applyEffect(name) {
  const stage = document.getElementById("stage");
  stage.classList.add("ready", `fx-${name ?? "fade"}`);
}

function showCaption(text) {
  const el = document.getElementById("caption");
  el.textContent = text ?? "";
  setTimeout(() => el.classList.add("show"), 300);
}

function updateDots(total, current) {
  const dotsEl   = document.getElementById("slide-dots");
  const countEl  = document.getElementById("slide-counter");
  if (total <= 1) { dotsEl.classList.remove("visible"); countEl.classList.remove("visible"); return; }
  dotsEl.classList.add("visible");
  countEl.classList.add("visible");
  countEl.textContent = `${current + 1} / ${total}`;
  dotsEl.innerHTML = Array.from({ length: total }, (_, i) =>
    `<div class="player-dot ${i === current ? "active" : ""}"></div>`
  ).join("");
}

async function closeOverlay() {
  const stage = document.getElementById("stage");
  stage.classList.remove("fx-fade","fx-flash","fx-slide","fx-zoom","fx-reveal");
  stage.classList.add("exit");
  fadeAudio(document.getElementById("audio"), 700);
  // Stop YouTube by clearing the iframe src
  const yt = document.getElementById("yt-player");
  if (yt) yt.src = "";
  setTimeout(() => OBR.modal.close(MODAL_ID), 750);
}

function fadeAudio(audioEl, ms) {
  if (!audioEl || audioEl.paused) return;
  const start = audioEl.volume, steps = 20, stepMs = ms / steps;
  let cur = 0;
  const iv = setInterval(() => {
    cur++;
    audioEl.volume = Math.max(0, start * (1 - cur / steps));
    if (cur >= steps) { clearInterval(iv); audioEl.pause(); }
  }, stepMs);
}

function spawnParticles() {
  const canvas = document.getElementById("particles");
  const ctx    = canvas.getContext("2d");
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  canvas.classList.add("active");
  const particles = Array.from({ length: 60 }, () => ({
    x:canvas.width/2, y:canvas.height/2,
    vx:(Math.random()-.5)*14, vy:(Math.random()-.5)*14,
    life:1, size:Math.random()*3+1, hue:Math.random()*60+30
  }));
  let raf;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.life-=.025; p.vy+=.15;
      if (p.life <= 0) return;
      ctx.globalAlpha=p.life; ctx.fillStyle=`hsl(${p.hue},100%,70%)`;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;
    if (particles.some(p=>p.life>0)) raf=requestAnimationFrame(draw);
    else canvas.classList.remove("active");
  }
  draw();
  setTimeout(() => { cancelAnimationFrame(raf); canvas.classList.remove("active"); }, 3000);
}

// ── Slide transition ─────────────────────────────────────
function goToSlide(index) {
  if (!images.length || index < 0 || index >= images.length) return;
  const img = document.getElementById("scene-img");

  // Fade out, swap src, fade in
  img.classList.add("hidden");
  setTimeout(() => {
    img.src = images[index];
    img.onload  = () => img.classList.remove("hidden");
    img.onerror = () => img.classList.remove("hidden");
  }, 450);

  updateDots(images.length, index);
}

// ── Boot ─────────────────────────────────────────────────
OBR.onReady(async () => {
  const loader = document.getElementById("loader");

  // Show close button for GM only
  const role = await OBR.player.getRole();
  if (role === "GM") {
    const closeBtn = document.getElementById("gm-close-btn");
    closeBtn.style.display = "block";
    closeBtn.addEventListener("click", closeOverlay);
  }

  try {
    const metadata   = await OBR.room.getMetadata();
    const scenes     = metadata[META_SCENES] ?? [];
    const activeId   = metadata[META_ACTIVE];
    const slideIndex = metadata["cutscene-manager/slide"] ?? 0;
    scene            = scenes.find(s => s.id === activeId);

    if (!scene) { await OBR.modal.close(MODAL_ID); return; }

    // Support both old (imageUrl) and new (images[]) format
    images = scene.images?.length
      ? scene.images
      : (scene.imageUrl ? [scene.imageUrl] : []);

    setBackground(scene.overlay);
    applyLetterbox(scene.letterbox);

    // Load first image — works for both URLs and base64 data URLs
    const img = document.getElementById("scene-img");
    if (images.length > 0) {
      const src = images[slideIndex] ?? images[0];
      img.style.display = "block";
      await new Promise(res => {
        img.onload  = res;
        img.onerror = () => {
          // Show a fallback placeholder instead of blank screen
          img.style.display = "none";
          const stage = document.getElementById("stage");
          const placeholder = document.createElement("div");
          placeholder.style.cssText = "color:rgba(255,255,255,.3);font-size:48px;margin-bottom:16px";
          placeholder.textContent = "🖼️";
          stage.insertBefore(placeholder, stage.firstChild);
          res();
        };
        img.src = src;
      });
    } else {
      img.style.display = "none";
    }

    loader.style.display = "none";
    applyEffect(scene.effect);
    if (scene.effect === "flash") spawnParticles();
    showCaption(scene.caption);
    updateDots(images.length, slideIndex);

    // ── Audio / Music ──────────────────────────────────
    if (scene.audioUrl) {
      const ytUrl = getYouTubeEmbedUrl(scene.audioUrl);
      if (ytUrl) {
        // YouTube: load into hidden iframe — audio plays, video stays invisible
        const yt = document.getElementById("yt-player");
        yt.src = ytUrl;
      } else {
        // Direct audio file (.mp3 / .ogg) — fade in
        const audio = document.getElementById("audio");
        audio.src = scene.audioUrl; audio.volume = 0; audio.loop = true;
        try {
          await audio.play();
          let vol = 0;
          const iv = setInterval(() => {
            vol = Math.min(1, vol + .05); audio.volume = vol;
            if (vol >= 1) clearInterval(iv);
          }, 80);
        } catch {}
      }
    }

    if (scene.duration > 0) setTimeout(closeOverlay, scene.duration * 1000);

  } catch (err) {
    loader.innerHTML = `<div style="color:#ef4444;font-family:sans-serif;font-size:14px;text-align:center">
      Failed to load scene.<br><small>${err.message}</small></div>`;
  }

  // ── Listen for GM slide changes ──────────────────────
  OBR.broadcast.onMessage(CH_SLIDE, (event) => {
    const { slideIndex } = event.data ?? {};
    if (typeof slideIndex === "number") goToSlide(slideIndex);
  });

  // ── Listen for stop ──────────────────────────────────
  OBR.broadcast.onMessage(CH_STOP, closeOverlay);
});
</script>
</body>
</html>
